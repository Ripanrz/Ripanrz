name: Metrics
on:
  # Berjalan otomatis setiap tengah malam
  schedule: [{cron: "0 0 * * *"}]
  # Memungkinkan dijalankan secara manual dari tab Actions
  workflow_dispatch:
  # Berjalan setiap kali Anda push ke main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token yang kita buat di Langkah 2
          token: ${{ secrets.METRICS_TOKEN }}

          # Konfigurasi Tampilan
          user: Ripanrz
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Jakarta
          
          # Plugin Bahasa (Menggantikan Top Languages)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # Output file
          filename: github-metrics.svg
